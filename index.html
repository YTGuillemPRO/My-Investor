<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProTrade Simulator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <!-- LOGIN -->
    <div id="auth-container" class="auth-box">
        <h1>ProTrade <span>Simulator</span></h1>
        <p>Mercado de inversión virtual</p>
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="password" placeholder="Contraseña">
        <button onclick="login()" class="btn-primary">Iniciar Sesión</button>
        <button onclick="register()" class="btn-secondary">Crear Cuenta</button>
        <p id="auth-message"></p>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard-container" class="dashboard" style="display: none;">
        <header>
            <div class="logo">ProTrade <span>SIM</span></div>
            <div class="user-info">
                <span id="user-email"></span>
                <button onclick="logout()" class="btn-logout">Cerrar Sesión</button>
            </div>
        </header>

        <div class="main-content">
            <div class="left-column">
                <div class="card portfolio-card">
                    <h3>Tu Portafolio</h3>
                    <div class="balance">
                        <span>Capital Total</span>
                        <h2>$<span id="total-balance">0.00</span></h2>
                    </div>
                    <div class="assets">
                        <div class="asset-row">
                            <span>USD (Efectivo)</span>
                            <strong>$<span id="usd-balance">0</span></strong>
                        </div>
                        <div class="asset-row">
                            <span>BTC (Bitcoin)</span>
                            <strong><span id="btc-balance">0</span> ₿</strong>
                        </div>
                    </div>
                </div>

                <div class="card market-card">
                    <h3>Mercado Cripto</h3>
                    <div id="crypto-list"></div>
                </div>
            </div>

            <div class="right-column">
                <div class="card chart-card">
                    <div class="chart-header">
                        <h3>Bitcoin / USD</h3>
                        <span class="price-tag">$<span id="btc-price">Cargando...</span></span>
                    </div>
                    <div class="chart-container">
                        <canvas id="priceChart"></canvas>
                    </div>
                </div>

                <div class="card trade-card">
                    <h3>Operar con Bitcoin</h3>
                    <p>Precio de mercado actual</p>
                    <input type="number" id="trade-amount" placeholder="Cantidad en USD a operar">
                    <div class="trade-buttons">
                        <button onclick="buyBitcoin()" class="btn-buy">Comprar</button>
                        <button onclick="sellBitcoin()" class="btn-sell">Vender</button>
                    </div>
                    <p id="trade-message"></p>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
